<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table id="result"  border="1"></table>

    <script>
            let tag = " ";

            for (let i = 2; i < 10; i++)    {               // 얘가 행, 2단              
                            
                            tag += "<tr>";              // 행을 열어주는 tr             
                        
                                for (let j = 1; j < 10; j++)    {               //얘가 열, 곱해지는 수              
                                       
                                    tag += `<td>${i}    x   ${j}    =   ${i*j}  </td>`
                                        
                        
                                }
                        
                                tag +=  "</tr>"             //한 줄을 닫아주는 tr
                        
                        }

                        document.querySelector("#result").innerHTML = tag;
    </script>
</body>
</html>
